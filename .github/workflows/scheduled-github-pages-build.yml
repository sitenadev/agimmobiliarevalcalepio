name: Deploy Jekyll with GitHub Pages dependencies preinstalled
on:
  push:
    branches: ["master"]
  workflow_dispatch:
  schedule:
    - cron: "0 7,19 * 11,12,1,2,3 *"
    - cron: "0 6,18 * 4,5,6,7,8,9,10 *"
    - cron: "0 23 30 12 *"
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Scrape properties and generate JSON
        run: |
          mkdir -p _data
          python3 << 'EOF'
          import re
          import json
          import sys
          import time
          import urllib.request
          url = "https://www.agenziavalcalepio.it/"
          req = urllib.request.Request(url, headers={
              "User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/120.0 Safari/537.36",
              "Accept-Language": "it-IT,it;q=0.9",
          })
          html = None
          for attempt in range(1, 4):
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      html = r.read().decode("utf-8", errors="replace")
                  print(f"[INFO] Page fetched successfully (attempt {attempt})", file=sys.stderr)
                  break
              except Exception as e:
                  print(f"[WARN] Attempt {attempt} failed: {e}", file=sys.stderr)
                  if attempt < 3:
                      time.sleep(attempt * 5)
          if html is None:
              print("[ERROR] All attempts failed, aborting", file=sys.stderr)
              sys.exit(1)
          blocks = re.split(r'<div class="dispbox">', html)[1:]
          print(f"[INFO] Found {len(blocks)} blocks", file=sys.stderr)
          def safe_int(lst, idx):
              try: return int(lst[idx])
              except: return 0
          data = []
          for i, block in enumerate(blocks):
              try:
                  a = re.search(r'<a href="([^"]+)">([^<]+)<br>\s*([^<]+)</a>', block)
                  if not a:
                      print(f"[WARN] Block {i}: no link found", file=sys.stderr)
                      continue
                  page_url = a.group(1)
                  title    = a.group(2).strip()
                  city     = a.group(3).strip()
                  sub = re.search(r'<div class="disp-sub">([^<]*)</div>', block)
                  zone = sub.group(1).strip() if sub else ""
                  img = re.search(r'<img class="homere" src="([^"]+)"', block)
                  if img:
                      raw = img.group(1).replace("https://www.", "").replace("https://", "")
                      img_url = f"https://images.weserv.nl/?url={raw}&w=600&h=600&fit=cover&a=attention"
                  else:
                      img_url = None
                  foot = re.search(r'<div class="disp-foot">(.*?)</div>', block, re.DOTALL)
                  price = None
                  if foot:
                      price_m = re.search(r'([\d\.\,]+\s*€)', foot.group(1))
                      price = price_m.group(1).strip() if price_m else None
                  nums = re.findall(r'<b>(\d+)</b>', block)
                  bed  = safe_int(nums, 0)
                  bath = safe_int(nums, 1)
                  sqm  = safe_int(nums, 2)
                  data.append({
                      "title": title,
                      "city":  city,
                      "zone":  zone,
                      "url":   page_url,
                      "image": img_url,
                      "price": price,
                      "bed":   f"{bed} {'camera' if bed == 1 else 'camere'}" if bed else "n/d",
                      "bath":  f"{bath} {'bagno' if bath == 1 else 'bagni'}" if bath else "n/d",
                      "sqm":   f"{sqm} m²" if sqm else "n/d",
                  })
              except Exception as e:
                  print(f"[ERROR] Block {i}: {e}", file=sys.stderr)
          print(f"[INFO] Properties extracted: {len(data)}", file=sys.stderr)
          with open("_data/properties-api.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          print("[OK] _data/properties-api.json written.", file=sys.stderr)
          EOF
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
